[alembic]
script_location = alembic
sqlalchemy.url = sqlite+aiosqlite:///./sqlite.db
timezone = UTC

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = simple

[logger_root]
level = INFO
handlers = console
qualname = root

[handler_console]
class = StreamHandler
level = INFO
formatter = simple
args = (sys.stderr,)

[formatter_simple]
format = %(levelname)s - %(name)s - %(message)s
