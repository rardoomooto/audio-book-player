version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audioplayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/audioplayer
    volumes:
      - ../backend:/app
      - nas_storage:/mnt/nas
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ../frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ../frontend:/app/frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nas_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /path/to/nas
