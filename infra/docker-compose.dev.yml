version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audioplayer
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/audioplayer
    volumes:
      - ./../backend:/app
      - nas_storage_dev:/mnt/nas
    ports:
      - "8000:8000"
    command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build: ../frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./../frontend:/app/frontend
    command: ["nginx", "-g", "daemon off;"]

volumes:
  postgres_data_dev:
  nas_storage_dev:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /path/to/nas
