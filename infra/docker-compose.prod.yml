version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: audioplayer-db
    environment:
      POSTGRES_USER: ${DB_USER:-audioplayer}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: audioplayer
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - audioplayer-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-audioplayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: audioplayer-backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-audioplayer}:${DB_PASSWORD}@db:5432/audioplayer
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - WEBDAV_URL=${WEBDAV_URL}
      - WEBDAV_USERNAME=${WEBDAV_USERNAME}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD}
      - LOCAL_MOUNT_PATH=${LOCAL_MOUNT_PATH:-/mnt/nas}
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - nas_storage:/mnt/nas
      - backend_logs:/app/logs
    networks:
      - audioplayer-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: audioplayer-frontend
    networks:
      - audioplayer-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: audioplayer-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    networks:
      - audioplayer-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  audioplayer-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  nas_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NAS_MOUNT_PATH:-/path/to/nas}
  backend_logs:
  nginx_cache:
  nginx_logs:
  frontend_dist:
